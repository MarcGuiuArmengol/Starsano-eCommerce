services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-starsano}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: ./server
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-starsano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
      - ./server/tsconfig.json:/app/tsconfig.json
      - ./products_template.csv:/app/products_template.csv
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: development
    command: npm run dev
    ports:
      - "8080:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

  chatbot:
    build: ./ChatBot
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./ChatBot/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-starsano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./ChatBot/app:/app/app
      - ./ChatBot/data:/app/data
    depends_on:
      - db

  seo-writer:
    build: ./SEOArticleWriter
    command: tail -f /dev/null
    env_file:
      - ./SEOArticleWriter/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-starsano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./SEOArticleWriter/app:/app/app
    depends_on:
      - db

volumes:
  db_data:
